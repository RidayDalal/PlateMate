<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlateMate — AI Kitchen Assistant</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="pm-bg min-h-screen">
  <div class="container mx-auto px-4 py-10 max-w-3xl">

    <!-- ── Header ── -->
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="PlateMate logo" class="h-12 w-auto" />
        <h1 class="text-4xl font-extrabold">
          <span class="pm-red">Plate</span><span class="pm-green">Mate</span>
        </h1>
      </div>

      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar border pm-border">
          <div class="w-10 rounded-full">
            <img alt="User Profile" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Riday" />
          </div>
        </div>
        <ul tabindex="0" class="mt-3 z-[1] p-2 shadow-lg menu menu-sm dropdown-content bg-base-100 rounded-xl w-52 border pm-border">
          <li class="menu-title text-xs font-semibold uppercase opacity-50">Account</li>
          <li><a class="py-2">Profile</a></li>
          <li><a class="py-2">Saved Recipes</a></li>
          <div class="divider my-0"></div>
          <li><a class="text-error py-2">Logout</a></li>
        </ul>
      </div>
    </div>

    <!-- ── Input card ── -->
    <div class="pm-card mb-8">

      <!-- Ingredients -->
      <h2 class="pm-label">What's in your fridge?</h2>
      <textarea id="ingredients" class="textarea textarea-bordered w-full h-32 text-base pm-textarea mb-1" placeholder="Chicken, spinach, garlic..."></textarea>
      <p id="ingredientsError" class="hidden text-sm font-medium pm-red-text mb-5 mt-1">Please add at least one ingredient before searching.</p>
      <div class="mb-5"></div>

      <!-- Dietary Restriction -->
      <h2 class="pm-label">Dietary Restriction <span class="text-xs font-normal text-slate-400 ml-1">(optional)</span></h2>
      <div class="flex flex-wrap gap-2 mb-6" id="dietGroup">
        <button type="button" class="diet-btn" data-value="vegetarian">🥦 Vegetarian</button>
        <button type="button" class="diet-btn" data-value="halal">☪️ Halal</button>
        <button type="button" class="diet-btn" data-value="vegan">🌱 Vegan</button>
      </div>

      <!-- Cuisine + Servings -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div>
          <h2 class="pm-label">Cuisine</h2>
          <select id="cuisineSelect" class="select select-bordered w-full pm-select">
            <option value="indian">Indian</option>
            <option value="mexican">Mexican</option>
            <option value="chinese">Chinese</option>
            <option value="japanese">Japanese</option>
          </select>
        </div>
        <div>
          <h2 class="pm-label">Servings</h2>
          <div class="flex items-center justify-between pm-stepper h-[3rem]">
            <button id="minusBtn" class="btn btn-xs btn-circle btn-ghost">−</button>
            <span id="peopleCount" class="font-bold pm-brown">1</span>
            <button id="plusBtn" class="btn btn-xs btn-circle btn-ghost">+</button>
          </div>
        </div>
      </div>

      <button id="searchBtn" class="pm-btn-primary btn w-full text-white border-none text-lg font-bold rounded-xl h-[3.5rem]">
        Find Recipes
      </button>
    </div>

    <!-- ── Results ── -->
    <div id="recipesContainer" class="pm-card">
      <h2 class="text-xl font-bold mb-6 pm-brown">Suggested for You</h2>
      <div id="recipesList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
